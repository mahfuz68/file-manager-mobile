name: r2_file_manager
description: A Cloudflare R2 File Manager with Firebase Auth — dark orange theme.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.3

  # HTTP
  http: ^1.2.0

  # Crypto (AWS SigV4)
  crypto: ^3.0.3

  # XML parsing (S3 list response)
  xml: ^6.5.0

  # State
  provider: ^6.1.2

  # UI / fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # File picker (upload)
  file_picker: ^8.0.3

  # Open download URLs in browser
  url_launcher: ^6.2.5

  # Clipboard + share
  share_plus: ^9.0.0

  # .env loading
  flutter_dotenv: ^5.1.0

  # Date formatting
  intl: ^0.19.0

  # Path utils
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
